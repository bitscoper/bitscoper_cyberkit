  upload-release:
    name: Upload Release
    needs: [
        build-for-linux,
        build-for-android,
        build-for-macos,
        build-for-ios,
        build-for-windows,
        # build-for-web,
      ]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6.0.2

      - name: Download All Artifacts
        uses: actions/download-artifact@v8.0.1

      - name: Archive Build Artifacts and Debug Symbols
        run: |
          zip -r ./Linux_x64_Executable.zip ./Linux/* -x "*.AppImage" -x "*.symbols"
          zip -r ./Android_Debug_Symbols.zip ./Android/*.symbols
          zip -r ./APK_Checksums.zip ./Android/*.sha1
          zip -r ./macOS_Executable.zip ./macOS/Bitscoper_CyberKit-macOS.app
          zip -r ./macOS_Debug_Symbols.zip ./macOS/*.symbols
          zip -r ./iOS_Executable.zip ./iOS/Bitscoper_CyberKit-iOS.app
          zip -r ./Windows_x64_Executable.zip ./Windows/* -x "*.msix" -x "*.symbols"
          # zip -r ./Web_Application.zip ./Web/*
        shell: bash

      - name: Get Version
        run: echo "VERSION=$(grep '^version:' ./pubspec.yaml | awk '{print $2}')" >> $GITHUB_ENV
        shell: bash

      - name: Rename AppImage
        run: |
          APPIMAGE_VERSION=${VERSION%%+*}
          mv ./Linux/Bitscoper_CyberKit-x64.AppImage ./Linux/Bitscoper_CyberKit-$APPIMAGE_VERSION-x64.AppImage
        shell: bash

      - name: Delete Existing Tag and Release (If Any)
        run: |
          RELEASE_ID=$(curl --silent --show-error --header 'Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}' https://api.github.com/repos/${{ github.repository }}/releases/tags/v$VERSION | jq '.id')
          if [ "$RELEASE_ID" != "null" ]; then
            curl --silent --show-error --header 'Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}' --request DELETE https://api.github.com/repos/${{ github.repository }}/releases/$RELEASE_ID
            git push --delete origin v$VERSION
          fi
        shell: bash

      - name: Create Release
        uses: ncipollo/release-action@v1.21.0
        with:
          artifacts: |
            ./Linux/*.AppImage
            ./Linux/Bitscoper_CyberKit-Linux_x64.symbols
            ./Android/Bitscoper_CyberKit.aab
            ./Android/Bitscoper_CyberKit-x86_64.apk
            ./Android/Bitscoper_CyberKit-ARM64_V8A.apk
            ./Android/Bitscoper_CyberKit-ARMEABI_V7A.apk
            ./iOS/Bitscoper_CyberKit-iOS_ARM64.symbols
            ./Windows/Bitscoper_CyberKit.msix
            ./Windows/Bitscoper_CyberKit-Windows_x64.symbols
            ./*.zip
          tag: v${{ env.VERSION }}
          token: ${{ secrets.GITHUB_TOKEN }}

  update-docker-image:
    name: Update Docker Images
    needs: [upload-release]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Install Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.13"

      - name: Install PIP
        run: |
          python -m pip install --upgrade pip
        shell: bash

      # - name: Install AWS CLI
      #   run: |
      #     pip install --upgrade awscli
      #   shell: bash

      - name: Checkout Repository
        uses: actions/checkout@v6.0.2

      - name: Build and Push Docker Image to GHCR
        run: |
          docker login --username bitscoper --password ${{secrets.GITHUB_TOKEN}} ghcr.io
          docker build . --tag ghcr.io/bitscoper/bitscoper_cyberkit:latest
          docker push ghcr.io/bitscoper/bitscoper_cyberkit:latest
        shell: bash

