# By Abdullah As-Sadeed

name: Build, Release, and Deploy
on:
  push:
    branches:
      - main
jobs:
  build-for-linux:
    name: Build for Linux
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Setup Flutter
        uses: subosito/flutter-action@v2.23.0
        with:
          channel: stable

      - name: Install Dependencies
        run: |
          sudo apt update -y
          sudo apt install -y ninja-build libgtk-3-dev fuse
        shell: bash

      - name: Run flutter doctor
        run: flutter doctor -v
        shell: bash

      - name: Checkout Repository
        uses: actions/checkout@v6.0.2

      - name: Get Dependencies
        run: flutter pub get -v
        shell: bash

      - name: Build for Linux
        run: flutter build linux --release --obfuscate --split-debug-info=./build/Debug_Symbols/Linux_x64/ -v
        shell: bash

      - name: Rename Build Artifacts
        run: mv ./build/Debug_Symbols/Linux_x64/app.linux-x64.symbols ./build/Debug_Symbols/Linux_x64/Bitscoper_CyberKit-Linux_x64.symbols
        shell: bash

      - name: Download appimagetool (x86_64) and Make It Executable
        run: |
          wget https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x ./appimagetool-x86_64.AppImage
        shell: bash

      - name: Copy Build Artifacts, and Icon into AppDir
        run: |
          cp -r ./build/linux/x64/release/bundle/* ./Linux_Extras/Bitscoper_CyberKit.AppDir/
          cp ./assets/icon/maskable_icon_x512.png ./Linux_Extras/Bitscoper_CyberKit.AppDir/Bitscoper_CyberKit.png
        shell: bash

      - name: Permit Execution of AppRun and Binary
        run: |
          chmod +x ./Linux_Extras/Bitscoper_CyberKit.AppDir/AppRun
          chmod +x ./Linux_Extras/Bitscoper_CyberKit.AppDir/Bitscoper_CyberKit
        shell: bash

      - name: Create AppImage and Make It Executable
        run: |
          ./appimagetool-x86_64.AppImage ./Linux_Extras/Bitscoper_CyberKit.AppDir ./Bitscoper_CyberKit-x64.AppImage
          chmod +x ./Bitscoper_CyberKit-x64.AppImage
        shell: bash

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v7.0.0
        with:
          name: Linux
          path: |
            build/linux/x64/release/bundle/*
            Bitscoper_CyberKit-x64.AppImage
            build/Debug_Symbols/Linux_x64/Bitscoper_CyberKit-Linux_x64.symbols

  build-for-android:
    name: Build for Android
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Setup Flutter
        uses: subosito/flutter-action@v2.23.0
        with:
          channel: stable

      - name: Run flutter doctor
        run: flutter doctor -v
        shell: bash

      - name: Checkout Repository
        uses: actions/checkout@v6.0.2

      - name: Get Dependencies
        run: flutter pub get -v
        shell: bash

      - name: Create key.properties
        run: |
          echo "storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" >> ./android/key.properties
          echo "keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}" >> ./android/key.properties
          echo "keyAlias=Bitscoper_CyberKit" >> ./android/key.properties
          echo "storeFile=./KeyStore.jks" >> ./android/key.properties
        shell: bash

      - name: Create keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE }}" | base64 --decode > ./android/app/KeyStore.jks
        shell: bash

      - name: Build appbundle
        run: flutter build appbundle --release --obfuscate --split-debug-info=./build/Debug_Symbols/Android/ -v
        shell: bash

      - name: Build APKs
        run: flutter build apk --split-per-abi --release --obfuscate --split-debug-info=./build/Debug_Symbols/Android/ -v
        shell: bash

      - name: Rename Build Artifacts
        run: |
          mv ./build/app/outputs/bundle/release/app-release.aab ./build/app/outputs/bundle/release/Bitscoper_CyberKit.aab
          mv ./build/Debug_Symbols/Android/app.android-x64.symbols ./build/Debug_Symbols/Android/Bitscoper_CyberKit-Android_x64.symbols
          mv ./build/Debug_Symbols/Android/app.android-arm64.symbols ./build/Debug_Symbols/Android/Bitscoper_CyberKit-Android_ARM64.symbols
          mv ./build/Debug_Symbols/Android/app.android-arm.symbols ./build/Debug_Symbols/Android/Bitscoper_CyberKit-Android_ARM.symbols
          mv ./build/app/outputs/flutter-apk/app-x86_64-release.apk ./build/app/outputs/flutter-apk/Bitscoper_CyberKit-x86_64.apk
          mv ./build/app/outputs/flutter-apk/app-x86_64-release.apk.sha1 ./build/app/outputs/flutter-apk/Bitscoper_CyberKit-x86_64.apk.sha1
          mv ./build/app/outputs/flutter-apk/app-arm64-v8a-release.apk ./build/app/outputs/flutter-apk/Bitscoper_CyberKit-ARM64_V8A.apk
          mv ./build/app/outputs/flutter-apk/app-arm64-v8a-release.apk.sha1 ./build/app/outputs/flutter-apk/Bitscoper_CyberKit-ARM64_V8A.apk.sha1
          mv ./build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk ./build/app/outputs/flutter-apk/Bitscoper_CyberKit-ARMEABI_V7A.apk
          mv ./build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk.sha1 ./build/app/outputs/flutter-apk/Bitscoper_CyberKit-ARMEABI_V7A.apk.sha1
        shell: bash

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v7.0.0
        with:
          name: Android
          path: |
            build/app/outputs/bundle/release/Bitscoper_CyberKit.aab
            build/Debug_Symbols/Android/Bitscoper_CyberKit-Android_x64.symbols
            build/Debug_Symbols/Android/Bitscoper_CyberKit-Android_ARM64.symbols
            build/Debug_Symbols/Android/Bitscoper_CyberKit-Android_ARM.symbols
            build/app/outputs/flutter-apk/Bitscoper_CyberKit-x86_64.apk
            build/app/outputs/flutter-apk/Bitscoper_CyberKit-x86_64.apk.sha1
            build/app/outputs/flutter-apk/Bitscoper_CyberKit-ARM64_V8A.apk
            build/app/outputs/flutter-apk/Bitscoper_CyberKit-ARM64_V8A.apk.sha1
            build/app/outputs/flutter-apk/Bitscoper_CyberKit-ARMEABI_V7A.apk
            build/app/outputs/flutter-apk/Bitscoper_CyberKit-ARMEABI_V7A.apk.sha1

  build-for-macos:
    name: Build for macOS
    runs-on: macos-26
    permissions:
      contents: read
    steps:
      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.4"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2.23.0
        with:
          channel: stable

      - name: Run flutter doctor
        run: flutter doctor -v

      - name: Checkout Repository
        uses: actions/checkout@v6.0.2

      - name: Get Dependencies
        run: flutter pub get -v

      - name: Build for macOS
        run: flutter build macos --release --obfuscate --split-debug-info=./build/Debug_Symbols/macOS/ -v

      - name: Rename Build Artifacts
        run: |
          mv ./build/macos/Build/Products/Release/Bitscoper\ CyberKit.app ./build/macos/Build/Products/Release/Bitscoper_CyberKit-macOS.app
          mv ./build/Debug_Symbols/macOS/app.darwin-x86_64.symbols ./build/Debug_Symbols/macOS/Bitscoper_CyberKit-macOS_x86_64.symbols
          mv ./build/Debug_Symbols/macOS/app.darwin-arm64.symbols ./build/Debug_Symbols/macOS/Bitscoper_CyberKit-macOS_ARM64.symbols
        shell: bash

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v7.0.0
        with:
          name: macOS
          path: |
            build/macos/Build/Products/Release/Bitscoper_CyberKit-macOS.app
            build/Debug_Symbols/macOS/Bitscoper_CyberKit-macOS_x86_64.symbols
            build/Debug_Symbols/macOS/Bitscoper_CyberKit-macOS_ARM64.symbols

  build-for-ios:
    name: Build for iOS
    runs-on: macos-26
    permissions:
      contents: read
    steps:
      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.4"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2.23.0
        with:
          channel: stable

      - name: Run flutter doctor
        run: flutter doctor -v

      - name: Checkout Repository
        uses: actions/checkout@v6.0.2

      - name: Get Dependencies
        run: flutter pub get -v

      - name: Build iOS Executable
        run: flutter build ios --no-codesign --release --obfuscate --split-debug-info=./build/Debug_Symbols/iOS_Executable/ -v

      # - name: Build IPA
      #   run: flutter build ipa --no-codesign --release --obfuscate --split-debug-info=./build/Debug_Symbols/IPA/ -v

      - name: Rename Build Artifacts
        run: |
          mv ./build/ios/iphoneos/Runner.app ./build/ios/iphoneos/Bitscoper_CyberKit-iOS.app
          mv build/Debug_Symbols/iOS_Executable/app.ios-arm64.symbols build/Debug_Symbols/iOS_Executable/Bitscoper_CyberKit-iOS_ARM64.symbols
        shell: bash

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v7.0.0
        with:
          name: iOS
          path: |
            build/ios/iphoneos/Bitscoper_CyberKit-iOS.app
            build/Debug_Symbols/iOS_Executable/Bitscoper_CyberKit-iOS_ARM64.symbols

  build-for-windows:
    name: Build for Windows
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - name: Setup Flutter
        uses: subosito/flutter-action@v2.23.0
        with:
          channel: stable

      - name: Run flutter doctor
        run: flutter doctor -v
        shell: powershell

      - name: Checkout Repository
        uses: actions/checkout@v6.0.2

      - name: Get Dependencies
        run: flutter pub get -v
        shell: powershell

      - name: Build for Windows
        run: dart run msix:create
        shell: powershell

      - name: Move MSIX Package
        run: |
          New-Item -ItemType Directory -Force -Path build\windows\x64\runner\Release_MSIX
          Move-Item -Path build\windows\x64\runner\Release\Bitscoper_CyberKit.msix -Destination build\windows\x64\runner\Release_MSIX/Bitscoper_CyberKit.msix
        shell: powershell

      - name: Rename Build Artifacts
        run: |
          Rename-Item -Path "build\Debug_Symbols\Windows\app.windows-x64.symbols" -NewName "Bitscoper_CyberKit-Windows_x64.symbols"
        shell: powershell

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v7.0.0
        with:
          name: Windows
          path: |
            build\windows\x64\runner\Release\*
            build\windows\x64\runner\Release_MSIX\Bitscoper_CyberKit.msix
            build\Debug_Symbols\Windows\Bitscoper_CyberKit-Windows_x64.symbols

